# Blueberry MOT tuned BoostTrack config.
# Confidence boosting is disabled because it was too permissive on dense berry clusters.
det_thresh:
  default: 0.24
max_age:
  default: 22
max_obs:
  default: 50
min_hits:
  default: 2
iou_threshold:
  default: 0.20
per_class:
  default: false
nr_classes:
  default: 4
asso_func:
  default: iou
is_obb:
  default: false
use_ecc:
  default: false
min_box_area:
  default: 8
aspect_ratio_thresh:
  default: 4.0
cmc_method:
  default: ecc
lambda_iou:
  default: 0.75
lambda_mhd:
  default: 0.15
lambda_shape:
  default: 0.10
use_dlo_boost:
  default: true
use_duo_boost:
  default: true
dlo_boost_coef:
  default: 0.60
s_sim_corr:
  default: false
use_rich_s:
  default: false
use_sb:
  default: false
use_vt:
  default: false
with_reid:
  default: false
