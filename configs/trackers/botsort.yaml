# Blueberry MOT tuned BotSort config.
# This tracker was already strongest on the blueberry benchmark, so changes are incremental:
# slightly stricter new-track creation plus appearance gating as a tie-breaker in dense clusters.
det_thresh:
  default: 0.24
max_age:
  default: 22
max_obs:
  default: 50
min_hits:
  default: 2
iou_threshold:
  default: 0.20
per_class:
  default: false
nr_classes:
  default: 4
asso_func:
  default: iou
is_obb:
  default: false
track_high_thresh:
  default: 0.24
track_low_thresh:
  default: 0.10
new_track_thresh:
  default: 0.22
track_buffer:
  default: 24
match_thresh:
  default: 0.75
proximity_thresh:
  default: 0.20
appearance_thresh:
  default: 1
cmc_method:
  default: sof
frame_rate:
  default: 30
fuse_first_associate:
  default: false
with_reid:
  default: false
