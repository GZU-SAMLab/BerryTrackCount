max_obs:
  default: 50
min_hits:
  default: 2
iou_threshold:
  default: 0.20
per_class:
  default: false
nr_classes:
  default: 4
asso_func:
  default: hmiou
is_obb:
  default: false
low_thresh:
  default: 0.08
delta_t:
