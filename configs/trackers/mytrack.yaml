# Blueberry MOT tuned MyTrack config.
# This variant is kept conservative by default so AARM/gating ablations start from a stable baseline.
det_thresh:
  default: 0.24
max_age:
  default: 22
max_obs:
  default: 50
min_hits:
  default: 2
iou_threshold:
  default: 0.20
per_class:
  default: false
nr_classes:
  default: 4
asso_func:
  default: hciou
is_obb:
  default: false
delta_t:
  default: 3
inertia:
  default: 0.18
w_association_emb:
  default: 0.75
alpha_fixed_emb:
  default: 0.95
aw_param:
  default: 0.40
embedding_off:
  default: true
cmc_off:
  default: false
aw_off:
  default: false
aarm_open:
  default: true
Q_xy_scaling:
  default: 0.015
Q_s_scaling:
  default: 0.0003
